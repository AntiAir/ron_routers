---
- name: Ensure Java is installed
  apt:
    name: openjdk-21-jre
    state: present
    update_cache: yes
    
- name: Add Jenkins GPG key
  get_url:
    url: https://pkg.jenkins.io/debian/jenkins.io-2026.key
    dest: /etc/apt/keyrings/jenkins-keyring.asc
    mode: '0644'
    
- name: Add Jenkins APT repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins
    
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Jenkins
  apt:
    name: jenkins
    state: present
    
- name: Ensure jenkins is enabled and started
  systemd:
    name: jenkins
    enabled: true
    state: started
